name: Bug report
description: Report a bug in Whirlpool
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search [existing issues](https://github.com/pedroaba/whirlpool/issues) before submitting.
  - type: input
    id: whirlpool-version
    attributes:
      label: Whirlpool version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 14.5"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.14.0"
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Command affected
      options:
        - whirlpool cache plan
        - whirlpool cache clear
        - whirlpool apps list
        - whirlpool apps remove
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps so we can reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect? What happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / relevant output
      description: Paste terminal output if helpful (remove sensitive paths if needed).
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmations
      options:
        - label: I have read the [Code of Conduct](https://github.com/pedroaba/whirlpool/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: My logs do not contain secrets or highly sensitive personal information
          required: true
